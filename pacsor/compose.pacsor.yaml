x-postgres-config: &postgres-config
  POSTGRES_HOST: core-db
  POSTGRES_DB: gorm
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_PORT: 5432

include:
  - path:
    - compose.storescp.yaml

services:
  core-db:
    image: "postgres:14-alpine"
    environment:
      *postgres-config
    volumes:
      - type: volume
        source: pgdata
        target: /var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - pacsor

  core:
    image: "milvue/pacsor-core:${DOCKER_IMAGE_TAG:?give a valid tag of image to pull}"
    environment:
      GOMAXPROCS: 0
      PROFILER: true
      SIGNED_URL: ${SIGNED_URL:-true}
      API_URL: ${API_URL:?need valid URL}
      TOKEN: ${TOKEN:?can't be empty}
      CALLBACK_URLS: ${CALLBACK_URLS:-http://storescu:8000}
      NO_DUPLICATE_UPLOAD: ${NO_DUPLICATE_UPLOAD:-true}
      INFERENCE_COMMANDS: ${INFERENCE_COMMANDS:-smarturgences,smartxpert}
      DICOM_FILTERS: ${DICOM_FILTERS:-[]}
      <<: *postgres-config
    depends_on:
      core-db:
        condition: service_healthy
    restart: always
    volumes:
        - inputs:/inputs
        - outputs:/outputs
    healthcheck:
      test: [ "CMD", "./healthcheck" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pacsor

  storescu:
    image: "milvue/pacsor-storescu:${DOCKER_IMAGE_TAG:?give a valid tag of image to pull}"
    restart: always
    environment:
      PACS_IP: ${PACS_IP:?need valid PACS IP}
      PACS_PORT: ${PACS_PORT:?need valid PACS PORT}
      PACS_AET: ${PACS_AET:?need valid PACS AET}
      MILVUE_AET: ${MILVUE_AET:-MILVUE}
    volumes:
      - outputs:/outputs
    healthcheck:
      test: [ "CMD-SHELL", "curl -X GET storescu:8000/healthcheck" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pacsor

  admin:
    image: "milvue/pacsor-admin:${DOCKER_IMAGE_TAG:?give a valid tag of image to pull}"
    depends_on:
      core:
        condition: service_healthy
    restart: on-failure
    ports:
      - "7000:8080"
    healthcheck:
      test: [ "CMD", "./healthcheck" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pacsor 
  
volumes:
  inputs:
  outputs:
  pgdata:

networks:
  pacsor:
